name: Build Steam Proxy DLL

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # 1. Генерируем временную библиотеку импорта из DEF-файла.
      # Используем уникальное имя 'proxy_exports.lib', чтобы избежать ошибки LNK1149
      - name: Generate Proxy Library
        shell: cmd
        run: |
          lib /def:steam_api64.def /out:proxy_exports.lib /machine:x64

      # 2. Компиляция и линковка.
      # /MT - статическая линковка рантайма (чтобы DLL работала без установки VCRedist)
      # /GL и /LTCG - необходимы для корректной работы с либой MinHook
      - name: Compile and Link DLL
        shell: cmd
        run: |
          cl /LD /EHsc /MT /std:c++17 /O2 /GL main.cpp ^
          /Fe:steam_api64.dll ^
          proxy_exports.lib ^
          /link /LTCG ^
          libMinHook.x64.lib kernel32.lib user32.lib

      # 3. Сохранение результата
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: steam_api64_proxy
          path: |
            steam_api64.dll
            steam_api64.lib
